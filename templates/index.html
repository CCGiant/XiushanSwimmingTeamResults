<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秀山泳隊成績查詢</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .toggle-checkbox:checked { right: 0; border-color: #2563eb; }
        .toggle-checkbox:checked + .toggle-label { background-color: #2563eb; }
    </style>
</head>
<body class="bg-[#f8fafc] min-h-screen p-4 md:p-8 text-slate-800 antialiased tracking-normal">

    <div class="max-w-5xl mx-auto bg-white rounded-3xl shadow-sm border border-slate-200/80 overflow-hidden p-6 md:p-12">
        <h1 class="text-2xl md:text-3xl font-black text-center text-slate-900 mb-10 tracking-tight">
            秀山泳隊成績查詢
        </h1>

        <div class="flex border-b border-slate-200 mb-10">
            <button id="tabBtn-athlete" class="w-1/2 py-4 text-center text-sm md:text-base font-black text-blue-600 border-b-2 border-blue-600 transition focus:outline-none">
                選手成績查詢
            </button>
            <button id="tabBtn-event" class="w-1/2 py-4 text-center text-sm md:text-base font-bold text-slate-400 border-b-2 border-transparent hover:text-blue-600 transition focus:outline-none">
                賽事成績總覽
            </button>
        </div>

        <div id="tab-athlete" class="tab-content active">
            <form id="athleteForm" class="space-y-4 mb-8">
                <div class="relative">
                    <div class="flex items-center justify-between mb-1.5">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">選擇選手 <span class="text-[10px] text-slate-400 normal-case tracking-normal ml-1">(可多選進行比較)</span></label>
                    </div>
                    <div id="selectedAthletesContainer" class="flex flex-wrap gap-2 mb-2 empty:hidden"></div>
                    <input type="text" id="athleteInput" placeholder="輸入姓名尋找選手..." autocomplete="off"
                           class="w-full rounded-xl border border-slate-200 bg-slate-50 text-slate-900 px-4 py-3 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition font-medium text-sm">
                    <ul id="autocompleteList" class="absolute z-50 w-full bg-white border border-slate-200 rounded-xl mt-1 max-h-48 overflow-y-auto hidden shadow-xl no-scrollbar"></ul>
                </div>

                <div class="flex flex-col sm:flex-row items-center justify-between bg-white border border-slate-200 p-2.5 rounded-xl shadow-sm gap-3">
                    <div class="flex items-center justify-center sm:justify-start gap-6 px-3 w-full sm:w-auto py-1">
                        <label class="flex items-center cursor-pointer gap-2 group">
                            <div class="relative inline-block w-8 align-middle select-none transition duration-200 ease-in">
                                <input type="checkbox" id="toggleStandard" class="toggle-checkbox absolute block w-4 h-4 rounded-full bg-white border-2 border-slate-200 appearance-none cursor-pointer group-hover:border-blue-300"/>
                                <label for="toggleStandard" class="toggle-label block overflow-hidden h-4 rounded-full bg-slate-200 cursor-pointer"></label>
                            </div>
                            <span class="text-xs font-bold text-slate-600 group-hover:text-slate-900 transition tracking-wide">達標檢測</span>
                        </label>
                        
                        <label class="flex items-center cursor-pointer gap-2 group">
                            <div class="relative inline-block w-8 align-middle select-none transition duration-200 ease-in">
                                <input type="checkbox" id="toggle25m-athlete" class="toggle-checkbox absolute block w-4 h-4 rounded-full bg-white border-2 border-slate-200 appearance-none cursor-pointer group-hover:border-blue-300"/>
                                <label for="toggle25m-athlete" class="toggle-label block overflow-hidden h-4 rounded-full bg-slate-200 cursor-pointer"></label>
                            </div>
                            <span class="text-xs font-bold text-slate-600 group-hover:text-slate-900 transition tracking-wide">含 25公尺</span>
                        </label>
                    </div>

                    <button type="button" id="toggleFiltersBtn" class="text-xs font-bold text-slate-500 tracking-wide hover:text-blue-600 transition flex items-center bg-slate-50 hover:bg-slate-100 px-3 py-2 rounded-lg w-full sm:w-auto justify-center border border-slate-100">
                        <span id="filterIcon" class="mr-1 text-sm font-bold leading-none">+</span> 展開篩選條件(年度、項目)
                    </button>
                </div>

                <div id="standardSelectors" class="hidden grid grid-cols-1 sm:grid-cols-3 gap-3 bg-slate-50/50 p-4 rounded-xl border border-slate-200 shadow-inner mt-2">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 mb-1">目標賽事</label>
                        <select id="stdMeet" class="w-full rounded-lg text-xs bg-white border border-slate-200 p-2.5 focus:outline-none focus:border-blue-500 text-slate-700 font-medium shadow-sm"></select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 mb-1">選手性別</label>
                        <select id="stdGender" class="w-full rounded-lg text-xs bg-white border border-slate-200 p-2.5 focus:outline-none focus:border-blue-500 text-slate-700 font-medium shadow-sm">
                            <option value="M">男子組 (M)</option>
                            <option value="F">女子組 (F)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 mb-1">參賽組別</label>
                        <select id="stdGroup" class="w-full rounded-lg text-xs bg-white border border-slate-200 p-2.5 focus:outline-none focus:border-blue-500 text-slate-700 font-medium shadow-sm"></select>
                    </div>
                </div>

                <div id="advancedFilters" class="bg-slate-50/50 p-4 rounded-xl border border-slate-200 shadow-inner space-y-4 hidden mt-2">
                    <div>
                        <label for="year" class="block text-[10px] font-bold text-slate-500 mb-1.5">限定賽事年份</label>
                        <select id="year" class="w-full sm:w-1/3 rounded-lg border border-slate-200 bg-white text-slate-900 px-3 py-2.5 text-xs font-medium focus:outline-none focus:border-blue-500 shadow-sm">
                            <option value="">全部年份</option>
                            <option value="2026">2026</option>
                            <option value="2025">2025</option>
                            <option value="2024">2024</option>
                            <option value="2023">2023</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 mb-2">限定特定項目</label>
                        <div id="eventFiltersContainer" class="flex flex-wrap gap-1.5"></div>
                    </div>
                </div>

                <button type="submit" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-3.5 px-4 rounded-xl active:scale-[0.99] transition shadow-md text-sm tracking-wider mt-2">
                    查詢選手成績
                </button>
            </form>
        </div>

        <div id="tab-event" class="tab-content">
            <form id="eventForm" class="space-y-4 mb-8">
                <div class="relative">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">選擇目標賽事</label>
                    <select id="activitySelect" required class="w-full rounded-xl border border-slate-200 bg-slate-50 text-slate-900 px-4 py-3 focus:outline-none focus:border-blue-500 transition font-medium text-sm">
                        <option value="" disabled selected>請下拉選擇一場賽事...</option>
                    </select>
                </div>
                
                <div>
                    <button type="button" id="toggleEventFiltersBtn" class="text-[11px] font-bold text-slate-500 tracking-wider hover:text-blue-600 transition flex items-center bg-slate-50 hover:bg-slate-100 px-3.5 py-2 rounded-xl border border-slate-100 shadow-sm">
                        <span id="eventFilterIcon" class="mr-1 text-sm font-bold leading-none">+</span> 展開篩選條件 (項目、歲級、性別)
                    </button>
                </div>

                <div id="eventAdvancedFilters" class="bg-slate-50/50 p-5 rounded-2xl border border-slate-200 shadow-inner hidden mt-2">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 mb-1.5">特定項目</label>
                            <select id="filterEventName" class="w-full rounded-xl text-xs bg-white border border-slate-200 p-2.5 focus:outline-none focus:border-blue-500 text-slate-700 font-medium shadow-sm">
                                <option value="">全部項目 (請先選擇上方賽事)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 mb-1.5">特定歲級 / 年級</label>
                            <select id="filterAgeGroup" class="w-full rounded-xl text-xs bg-white border border-slate-200 p-2.5 focus:outline-none focus:border-blue-500 text-slate-700 font-medium shadow-sm">
                                <option value="">全部歲級 (請先選擇上方賽事)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-slate-500 mb-1.5">特定性別</label>
                            <select id="filterGender" class="w-full rounded-xl text-xs bg-white border border-slate-200 p-2.5 focus:outline-none focus:border-blue-500 text-slate-700 font-medium shadow-sm">
                                <option value="">全部性別</option>
                                <option value="男子">男子組</option>
                                <option value="女子">女子組</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-3.5 px-4 rounded-xl active:scale-[0.99] transition shadow-md text-sm tracking-wider mt-4">
                    載入賽事成績
                </button>
            </form>
        </div>

        <div id="resultsContainer" class="space-y-12">
            <p class="text-center text-slate-400 text-sm mt-12 font-medium tracking-wide">設定條件以載入成績數據</p>
        </div>
    </div>

    <div id="chartModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/30 backdrop-blur-sm hidden" onclick="closeChartModal()">
        <div class="bg-white rounded-3xl border border-slate-200 max-w-2xl w-full p-6 shadow-2xl transition transform scale-95" onclick="event.stopPropagation()">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h4 id="modalTitle" class="text-lg font-black text-slate-900 tracking-tight">成績成長曲線</h4>
                    <p id="modalSubtitle" class="text-xs font-bold text-slate-400 uppercase tracking-wider mt-1">歷史進步軌跡</p>
                </div>
                <button onclick="closeChartModal()" class="text-slate-400 hover:text-slate-900 font-bold transition text-xl px-2">✕</button>
            </div>
            <div class="relative h-64 md:h-80 w-full">
                <canvas id="growthChart"></canvas>
            </div>
            <p class="text-[10px] font-medium text-slate-400 text-center mt-4">提示：滑動或點擊數據點可查看詳細賽事與分段配速</p>
        </div>
    </div>

    <script>
        const baseStandardEvents = ['50公尺自由式', '100公尺自由式', '200公尺自由式', '400公尺自由式', '50公尺仰式', '100公尺仰式', '200公尺仰式', '50公尺蛙式', '100公尺蛙式', '200公尺蛙式', '50公尺蝶式', '100公尺蝶式', '200公尺蝶式', '100公尺混合式', '200公尺混合式', '400公尺混合式'];
        const juniorEvents = ['25公尺自由式', '25公尺仰式', '25公尺蛙式', '25公尺蝶式'];

        let allAthletesDB = []; 
        let selectedAthletes = []; 
        let allStandardsDB = []; 
        let globalAthleteRawData = {}; 
        let myChartInstance = null;

        function cleanResultText(text) { return text ? String(text).trim().split(' ')[0] : 'N/A'; }
        function getSplitText(text) {
            if (!text) return ''; let parts = String(text).trim().split(' ');
            return parts.length > 1 ? parts.slice(1).join(' ').replace(/M:/g, 'm: ') : '';
        }
        function timeToSeconds(timeStr) {
            let cleanStr = cleanResultText(timeStr); if (cleanStr === 'N/A' || cleanStr.includes('DQ') || cleanStr.includes('未') || cleanStr.includes('棄')) return Infinity;
            let parts = cleanStr.split(':'); return parts.length === 2 ? parseInt(parts[0], 10) * 60 + parseFloat(parts[1]) : parseFloat(cleanStr) || Infinity;
        }
        function formatSeconds(secs) {
            if (secs === Infinity || isNaN(secs)) return 'N/A'; let m = Math.floor(secs / 60); let s = (secs % 60).toFixed(2);
            if (s.length < 5) s = s.padStart(5, '0'); return m > 0 ? `${m.toString().padStart(2, '0')}:${s}` : s;
        }
        function getActiveEventsList(include25m) { return include25m ? juniorEvents.concat(baseStandardEvents) : baseStandardEvents; }
        
        function getStandardEventName(item, include25m) {
            const fullText = (item.group_display || "") + " " + (item.event_name || "");
            if (item.event_display === '總成績') return null;
            let isSplit = item.event_display && item.event_display.includes('棒'); let isInd = !fullText.includes('接力') && !isSplit;
            const activeEvents = getActiveEventsList(include25m);

            if (isInd) { return activeEvents.find(evt => fullText.includes(evt)) || null;
            } else if (isSplit) {
                let dist = fullText.match(/4\s*[xX×*]\s*(25|50|100|200)/) ? fullText.match(/4\s*[xX×*]\s*(25|50|100|200)/)[1] + "公尺" : (fullText.includes('25公尺') ? "25公尺" : (fullText.includes('50公尺') ? "50公尺" : (fullText.includes('100公尺') ? "100公尺" : null)));
                let strokeMatch = fullText.match(/\((仰式|蛙式|蝶式|自由式)\)/); let stroke = strokeMatch ? strokeMatch[1] : null;
                if (!stroke && fullText.includes('混合式接力')) {
                    if (item.event_display.includes('1棒')) stroke = "仰式"; else if (item.event_display.includes('2棒')) stroke = "蛙式";
                    else if (item.event_display.includes('3棒')) stroke = "蝶式"; else if (item.event_display.includes('4棒')) stroke = "自由式";
                } else if (!stroke && fullText.includes('自由式接力')) stroke = "自由式";
                let result = dist && stroke ? dist + stroke : null; return activeEvents.includes(result) ? result : null;
            }
            return null;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            
            const athleteInput = document.getElementById('athleteInput'); 
            const autocompleteList = document.getElementById('autocompleteList'); 
            const selectedContainer = document.getElementById('selectedAthletesContainer');
            const toggleStandard = document.getElementById('toggleStandard');
            const panelStandard = document.getElementById('standardSelectors');
            const stdMeet = document.getElementById('stdMeet');
            const stdGender = document.getElementById('stdGender');
            const stdGroup = document.getElementById('stdGroup');
            const toggle25mAthlete = document.getElementById('toggle25m-athlete');
            const toggleFiltersBtn = document.getElementById('toggleFiltersBtn');
            const advancedFilters = document.getElementById('advancedFilters');
            const filterIcon = document.getElementById('filterIcon');
            const filterContainer = document.getElementById('eventFiltersContainer');
            const athleteForm = document.getElementById('athleteForm');
            const eventForm = document.getElementById('eventForm');
            const activitySelect = document.getElementById('activitySelect');
            const tabBtnAthlete = document.getElementById('tabBtn-athlete'); 
            const tabBtnEvent = document.getElementById('tabBtn-event');
            const tabAthlete = document.getElementById('tab-athlete'); 
            const tabEvent = document.getElementById('tab-event');
            const container = document.getElementById('resultsContainer');

            // 🧠 賽事總覽的動態過濾 DOM
            const toggleEventFiltersBtn = document.getElementById('toggleEventFiltersBtn');
            const eventAdvancedFilters = document.getElementById('eventAdvancedFilters');
            const eventFilterIcon = document.getElementById('eventFilterIcon');
            const filterEventName = document.getElementById('filterEventName');
            const filterAgeGroup = document.getElementById('filterAgeGroup');
            const filterGender = document.getElementById('filterGender');
            let currentEventDataCache = null; // 存放背後預載的賽事成績，避免重複 fetch

            try {
                const res = await fetch('/api/athletes');
                if (res.ok) { const raw = await res.json(); allAthletesDB = [...new Set(raw.map(name => name.trim()))]; }
            } catch (err) { console.error("無法加載選手名單", err); }

            try {
                const res = await fetch('/api/activities');
                if (res.ok) {
                    const acts = await res.json();
                    acts.forEach(act => {
                        const opt = document.createElement('option'); opt.value = act.activity_name; 
                        opt.textContent = `${act.activity_year} ${act.activity_short_name || act.activity_name}`; activitySelect.appendChild(opt);
                    });
                }
            } catch (err) { console.error("無法加載賽事清單", err); }

            try {
                const res = await fetch('/api/standards');
                if (res.ok) { allStandardsDB = await res.json(); } 
            } catch (err) { console.error("無法加載達標門檻", err); }

            baseStandardEvents.forEach(evt => {
                filterContainer.innerHTML += `<label class="cursor-pointer"><input type="checkbox" value="${evt}" class="event-checkbox peer sr-only"><div class="px-3 py-1.5 text-xs font-bold rounded-lg border border-slate-200 text-slate-500 peer-checked:bg-blue-600 peer-checked:text-white peer-checked:border-blue-600 hover:bg-slate-100 transition shadow-sm">${evt}</div></label>`;
            });

            function updateGroupOptions() {
                const selMeet = stdMeet.value; const selGen = stdGender.value;
                const groups = [...new Set(allStandardsDB.filter(s => s.meet_name === selMeet && s.gender === selGen).map(s => s.category_group))];
                stdGroup.innerHTML = groups.map(g => `<option value="${g}">${g}</option>`).join('');
            }

            toggleStandard.addEventListener('change', () => {
                if (allStandardsDB.length === 0) { alert("查無達標門檻資料庫！"); toggleStandard.checked = false; return; }
                panelStandard.classList.toggle('hidden', !toggleStandard.checked);
                if(toggleStandard.checked) {
                    if (stdMeet.options.length === 0) {
                        const meets = [...new Set(allStandardsDB.map(s => s.meet_name))];
                        stdMeet.innerHTML = meets.map(m => `<option value="${m}">${m}</option>`).join('');
                    }
                    updateGroupOptions();
                }
            });
            stdMeet.addEventListener('change', updateGroupOptions);
            stdGender.addEventListener('change', updateGroupOptions);

            function switchTab(mode) {
                container.innerHTML = '<p class="text-center text-slate-400 text-sm mt-12 font-medium tracking-wide">設定條件以載入成績數據</p>'; 
                if (mode === 'athlete') {
                    tabBtnAthlete.classList.add('text-blue-600', 'border-blue-600', 'font-black'); tabBtnAthlete.classList.remove('text-slate-400', 'border-transparent', 'font-bold');
                    tabBtnEvent.classList.remove('text-blue-600', 'border-blue-600', 'font-black'); tabBtnEvent.classList.add('text-slate-400', 'border-transparent', 'font-bold');
                    tabAthlete.classList.add('active'); tabEvent.classList.remove('active');
                } else {
                    tabBtnEvent.classList.add('text-blue-600', 'border-blue-600', 'font-black'); tabBtnEvent.classList.remove('text-slate-400', 'border-transparent', 'font-bold');
                    tabBtnAthlete.classList.remove('text-blue-600', 'border-blue-600', 'font-black'); tabBtnAthlete.classList.add('text-slate-400', 'border-transparent', 'font-bold');
                    tabEvent.classList.add('active'); tabAthlete.classList.remove('active');
                }
            }
            tabBtnAthlete.addEventListener('click', () => switchTab('athlete'));
            tabBtnEvent.addEventListener('click', () => switchTab('event'));

            toggleFiltersBtn.addEventListener('click', function() {
                advancedFilters.classList.toggle('hidden'); 
                filterIcon.textContent = advancedFilters.classList.contains('hidden') ? '+' : '−';
            });

            // 🧠 展開賽事總覽的動態篩選面板按鈕
            toggleEventFiltersBtn.addEventListener('click', function() {
                eventAdvancedFilters.classList.toggle('hidden'); 
                eventFilterIcon.textContent = eventAdvancedFilters.classList.contains('hidden') ? '+' : '−';
            });

            // 🧠 背景動態抓取賽事 Metadata，用來充填下拉選單
            activitySelect.addEventListener('change', async function() {
                const activityName = this.value;
                if (!activityName) return;
                
                filterEventName.innerHTML = '<option value="">載入項目中...</option>';
                filterAgeGroup.innerHTML = '<option value="">載入歲級中...</option>';
                
                try {
                    const res = await fetch(`/api/results?activity=${encodeURIComponent(activityName)}`);
                    currentEventDataCache = await res.json();
                    
                    let ages = new Set();
                    let events = new Set();
                    
                    currentEventDataCache.forEach(item => {
                        // 乾淨取出各賽事獨特的「歲級/年級」名稱
                        let g = item.group_display || "";
                        let age = g.replace(/男子組?|女子組?|男子|女子/g, '').trim();
                        if (age) ages.add(age);
                        
                        let stdName = getStandardEventName(item, true); // true 代表包含 25M
                        if (stdName) events.add(stdName);
                    });
                    
                    // 填入項目選項
                    let eventHtml = '<option value="">全部項目</option>';
                    const allPossibleEvents = getActiveEventsList(true);
                    const sortedEvents = Array.from(events).sort((a, b) => allPossibleEvents.indexOf(a) - allPossibleEvents.indexOf(b));
                    sortedEvents.forEach(evt => { eventHtml += `<option value="${evt}">${evt}</option>`; });
                    filterEventName.innerHTML = eventHtml;
                    
                    // 填入歲級選項
                    let ageHtml = '<option value="">全部歲級 / 年級</option>';
                    Array.from(ages).sort().forEach(age => { ageHtml += `<option value="${age}">${age}</option>`; });
                    filterAgeGroup.innerHTML = ageHtml;
                    
                } catch(e) {
                    console.error("動態資料庫加載失敗", e);
                    filterEventName.innerHTML = '<option value="">載入失敗</option>';
                    filterAgeGroup.innerHTML = '<option value="">載入失敗</option>';
                }
            });

            athleteInput.addEventListener('input', function() {
                const val = this.value.trim(); autocompleteList.innerHTML = '';
                if (!val) { autocompleteList.classList.add('hidden'); return; }
                const matches = allAthletesDB.filter(name => name.includes(val) && !selectedAthletes.includes(name));
                if (matches.length > 0) {
                    autocompleteList.classList.remove('hidden');
                    matches.forEach(name => {
                        const li = document.createElement('li'); 
                        li.textContent = name; 
                        li.className = "px-4 py-3 hover:bg-slate-50 text-sm font-bold text-slate-700 cursor-pointer transition border-b border-slate-100 last:border-0";
                        li.addEventListener('click', () => { 
                            addAthlete(name); 
                            athleteInput.value = ''; 
                            autocompleteList.classList.add('hidden'); 
                            athleteInput.focus(); 
                        });
                        autocompleteList.appendChild(li);
                    });
                } else { autocompleteList.classList.add('hidden'); }
            });
            
            document.addEventListener('click', (e) => { if (e.target !== athleteInput) autocompleteList.classList.add('hidden'); });

            function addAthlete(name) { if (selectedAthletes.includes(name)) return; selectedAthletes.push(name); renderSelectedAthletes(); }
            window.removeAthlete = function(name) { selectedAthletes = selectedAthletes.filter(n => n !== name); renderSelectedAthletes(); }
            
            function renderSelectedAthletes() {
                selectedContainer.innerHTML = '';
                selectedAthletes.forEach(name => {
                    selectedContainer.innerHTML += `<div class="flex items-center bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg text-xs font-bold border border-blue-200 shadow-sm">${name} <button type="button" class="ml-2 text-blue-400 hover:text-blue-700 transition font-bold" onclick="removeAthlete('${name}')">✕</button></div>`;

            }

            athleteForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                if (selectedAthletes.length === 0) { alert("請先選擇選手"); return; }
                const yearInput = document.getElementById('year').value;
                const checkedEvents = Array.from(document.querySelectorAll('.event-checkbox:checked')).map(cb => cb.value);
                const include25m = toggle25mAthlete.checked;
                
                let reqStandardMap = null;
                if (toggleStandard.checked) {
                    const sMeet = stdMeet.value; const sGen = stdGender.value; const sGroup = stdGroup.value;
                    reqStandardMap = {};
                    allStandardsDB.filter(s => s.meet_name === sMeet && s.gender === sGen && s.category_group === sGroup).forEach(s => reqStandardMap[s.event_name] = s.standard_time_sec);
                }

                container.innerHTML = '<div class="flex justify-center mt-12"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-slate-900"></div></div>';

                try {
                    const fetchPromises = selectedAthletes.map(name => fetch(`/api/results?name=${encodeURIComponent(name.trim())}`).then(res => res.json()));
                    const resultsArray = await Promise.all(fetchPromises);

                    const athletesPbData = {}; let combinedHistory = []; 
                    globalAthleteRawData = {}; 

                    selectedAthletes.forEach((name, index) => {
                        let rawData = resultsArray[index];
                        rawData.forEach(item => { item.standardEventName = getStandardEventName(item, include25m); });

                        let pbData = rawData;
                        if (checkedEvents.length > 0) pbData = pbData.filter(item => item.standardEventName && checkedEvents.includes(item.standardEventName));
                        athletesPbData[name] = pbData;

                        let histData = pbData; 
                        if (yearInput) histData = histData.filter(item => String(item.activity_year) === yearInput);
                        histData.forEach(item => combinedHistory.push({ ...item, athleteName: name }));
                    });

                    combinedHistory.sort((a, b) => (b.activity_year || 0) - (a.activity_year || 0));
                    container.innerHTML = '';
                    
                    if (selectedAthletes.length === 1) renderSinglePbBoard(selectedAthletes[0], athletesPbData[selectedAthletes[0]], container, include25m, reqStandardMap);
                    else renderMultiCompareTable(selectedAthletes, athletesPbData, checkedEvents, container, include25m);
                    renderHistoryList(combinedHistory, container, "歷屆參賽紀錄");

                } catch (error) { container.innerHTML = `<p class="text-center text-rose-500 bg-rose-50 p-4 rounded-lg text-sm font-bold">錯誤：${error.message}</p>`; }
            });

            // 🧠 動態篩選總表成績
            eventForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                const activityName = activitySelect.value;
                if (!activityName) return;
                const include25m = true; 

                // 抓取畫面上選擇的過濾條件
                const selEvent = filterEventName.value;
                const selGender = filterGender.value;
                const selAge = filterAgeGroup.value;

                container.innerHTML = '<div class="flex justify-center mt-12"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-slate-900"></div></div>';
                try {
                    // 若有快取則直接取用，免除二次載入的時間
                    let eventData = currentEventDataCache;
                    if (!eventData || eventData.length === 0 || eventData[0].activity_name !== activityName) {
                        const res = await fetch(`/api/results?activity=${encodeURIComponent(activityName)}`);
                        eventData = await res.json();
                        currentEventDataCache = eventData;
                    }
                    if (eventData.length === 0) { container.innerHTML = `<p class="text-center text-slate-500 mt-12 text-sm font-medium">此賽事尚無數據</p>`; return; }

                    // 🔥 執行精準多條件過濾
                    let filteredData = eventData.filter(item => {
                        let stdName = getStandardEventName(item, true); 
                        let passEvent = selEvent ? (stdName === selEvent) : true;
                        
                        let g = item.group_display || "";
                        let passGender = selGender ? g.includes(selGender) : true;
                        
                        let age = g.replace(/男子組?|女子組?|男子|女子/g, '').trim();
                        let passAge = selAge ? (age === selAge) : true;
                        
                        return passEvent && passGender && passAge;
                    });

                    if (filteredData.length === 0) { 
                        container.innerHTML = `<p class="text-center text-slate-500 bg-white p-6 border border-slate-200 rounded-2xl mt-8 font-bold shadow-sm">該篩選條件下無符合的成績數據</p>`; 
                        return; 
                    }

                    // 僅針對過濾出來的選手進行生涯紀錄比對 (加速渲染)
                    const uniqueAthletes = [...new Set(filteredData.filter(item => item.event_display !== '總成績').map(item => item.student_name.trim()))].filter(Boolean);
                    const lifetimePromises = uniqueAthletes.map(name => fetch(`/api/results?name=${encodeURIComponent(name)}`).then(r => r.json()));
                    const lifetimeResults = await Promise.all(lifetimePromises);

                    const lifetimeMap = {};
                    uniqueAthletes.forEach((name, idx) => {
                        const data = lifetimeResults[idx]; data.forEach(d => { d.standardEventName = getStandardEventName(d, include25m); }); lifetimeMap[name] = data;
                    });

                    const groupedEvents = {};
                    filteredData.forEach(item => {
                        item.standardEventName = getStandardEventName(item, include25m);
                        const key = (item.group_display || "未分組") + " - " + (item.event_name || "未知項目");
                        if (!groupedEvents[key]) groupedEvents[key] = []; groupedEvents[key].push(item);
                    });

                    // 若有使用篩選條件，標題加上附註
                    let filterTitleSuffix = (selEvent || selGender || selAge) ? '<span class="text-sm text-blue-500 font-bold ml-3 bg-blue-50 px-2 py-1 rounded-lg border border-blue-100 align-middle">已套用進階篩選</span>' : '';
                    container.innerHTML = `<h2 class="text-xl md:text-2xl font-black text-slate-900 mb-8 pb-4 border-b border-slate-200 tracking-tight">${activityName} ${filterTitleSuffix}</h2>`;

                    for (const [groupName, items] of Object.entries(groupedEvents)) {
                        items.sort((a, b) => {
                            let secA = timeToSeconds(a.result_text); let secB = timeToSeconds(b.result_text);
                            if (secA === Infinity && secB === Infinity) return 0;
                            if (secA === Infinity) return 1; if (secB === Infinity) return -1;
                            return secA - secB;
                        });

                        let groupHtml = `<div class="bg-white border border-slate-200 rounded-2xl shadow-sm mb-8 overflow-hidden"><div class="bg-slate-50/80 px-5 py-4 border-b border-slate-200"><h3 class="text-sm font-bold tracking-wide text-slate-800">${groupName}</h3></div><ul class="divide-y divide-slate-100">`;

                        items.forEach((item, index) => {
                            const evtSecs = timeToSeconds(item.result_text);
                            const stdName = item.standardEventName;
                            let pbBadge = ''; const cleanStudentName = item.student_name.trim();

                            if (stdName && item.event_display !== '總成績' && lifetimeMap[cleanStudentName]) {
                                let lifetimePbSecs = Infinity;
                                lifetimeMap[cleanStudentName].forEach(lItem => {
                                    if (lItem.standardEventName === stdName) {
                                        const lSecs = timeToSeconds(lItem.result_text); if (lSecs < lifetimePbSecs) lifetimePbSecs = lSecs;
                                    }
                                });
                                if (lifetimePbSecs !== Infinity && evtSecs !== Infinity) {
                                    if (evtSecs <= lifetimePbSecs) { 
                                        let drop = (lifetimePbSecs - evtSecs).toFixed(2);
                                        pbBadge = `<div class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-2 py-0.5 rounded border border-emerald-200 uppercase">NEW PB (-${drop}s)</div>`; 
                                    } 
                                    else { 
                                        const diff = (evtSecs - lifetimePbSecs).toFixed(2); 
                                        pbBadge = `<div class="text-[10px] font-medium text-slate-400">PB ${formatSeconds(lifetimePbSecs)} <span class="text-rose-400">(+${diff})</span></div>`; 
                                    }
                                }
                            }
                            
                            let rankHtml = '';
                            if (evtSecs === Infinity) {
                                rankHtml = `<div class="w-8 text-center text-slate-400 font-bold mr-2 text-sm">-</div>`;
                            } else {
                                if (index === 0) rankHtml = '<span class="text-2xl mr-2 filter drop-shadow-sm" title="金牌">🥇</span>';
                                else if (index === 1) rankHtml = '<span class="text-2xl mr-2 filter drop-shadow-sm" title="銀牌">🥈</span>';
                                else if (index === 2) rankHtml = '<span class="text-2xl mr-2 filter drop-shadow-sm" title="銅牌">🥉</span>';
                                else rankHtml = `<div class="w-8 text-center text-slate-400 font-black mr-2 text-sm">${index + 1}</div>`;
                            }

                            let displayType = item.event_display === '總成績' ? `<span class="px-1.5 py-0.5 text-[9px] font-bold bg-emerald-50 text-emerald-700 rounded border border-emerald-200 mr-2">總成績</span>` : '';
                            if (item.event_display && item.event_display.includes('棒')) displayType = `<span class="px-1.5 py-0.5 text-[9px] font-bold bg-amber-50 text-amber-700 rounded border border-amber-200 mr-2">${item.event_display}</span>`;
                            const splitText = getSplitText(item.result_text);

                            groupHtml += `<li class="px-5 py-4 flex flex-col md:flex-row md:items-center justify-between hover:bg-slate-50 transition">
                                <div class="flex items-center text-sm font-bold text-slate-800 mb-2 md:mb-0 w-full md:w-1/2">

                                    <div class="flex items-center justify-end w-full gap-3">
                                        ${pbBadge}
                                        <span class="text-xl font-black text-slate-900 tracking-tighter tabular-nums">${cleanResultText(item.result_text)}</span>
                                    </div>
                                    ${splitText ? `<div class="text-[10px] font-bold text-slate-400 tracking-wide uppercase mt-1">SPLIT ${splitText}</div>` : ''}
                                </div>
                            </li>`;
                        });
                        groupHtml += `</ul></div>`; container.innerHTML += groupHtml;
                    }
                } catch (error) { container.innerHTML = `<p class="text-center text-rose-500 text-sm font-bold mt-10">錯誤：${error.message}</p>`; }
            });
        });

        // 渲染單人 PB 卡片
        function renderSinglePbBoard(name, data, container, include25m, reqStandardMap) {
            const activeEvents = getActiveEventsList(include25m);
            const pbs = {}; activeEvents.forEach(evt => pbs[evt] = { indTime: Infinity, indItem: null, absTime: Infinity, absItem: null });
            data.forEach(item => {
                const strokeName = item.standardEventName; if (!strokeName) return;
                let isInd = !(item.event_display && item.event_display.includes('棒'));
                if (pbs[strokeName]) {
                    let secs = timeToSeconds(item.result_text);
                    if (secs !== Infinity) {
                        if (isInd && secs < pbs[strokeName].indTime) { pbs[strokeName].indTime = secs; pbs[strokeName].indItem = item; }
                        if (secs < pbs[strokeName].absTime) { pbs[strokeName].absTime = secs; pbs[strokeName].absItem = item; }
                    }
                }
            });
            const validPbKeys = Object.keys(pbs).filter(k => pbs[k].absTime !== Infinity);
            if (validPbKeys.length > 0) {
                let pbHtml = `<div class="mb-12">
                    <div class="flex flex-col sm:flex-row sm:items-baseline justify-between border-b border-slate-200 pb-4 mb-6">
                        <h2 class="text-lg font-bold text-slate-900">${name} 生涯最佳成績 (PB)</h2>
                        <span class="text-xs text-blue-500 font-semibold mt-1 sm:mt-0">👉 點擊卡片可查看該項目歷史成長曲線</span>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">`;
                
                validPbKeys.forEach(stroke => {
                    const record = pbs[stroke];
                    let indDisplay = record.indItem ? cleanResultText(record.indItem.result_text) : '無紀錄';
                    let absHtml = record.absTime < record.indTime ? `<span class="text-xs font-bold text-slate-400 ml-1">(${cleanResultText(record.absItem.result_text)})</span>` : '';
                    const bottomItem = record.indItem || record.absItem;
                    
                    let isJuniorBadge = stroke.includes('25公尺') ? `<span class="absolute top-5 right-5 bg-purple-50 text-purple-600 text-[10px] font-bold px-2 py-0.5 rounded border border-purple-200 uppercase tracking-wide">25m</span>` : '';
                    
                    let stdBadgeHtml = '';
                    if (reqStandardMap && reqStandardMap[stroke] !== undefined) {
                        const targetSec = reqStandardMap[stroke];
                        const mySec = record.absTime;
                        const diff = (mySec - targetSec).toFixed(2);
                        if (mySec <= targetSec) {
                            stdBadgeHtml = `<div class="mt-2.5 inline-block px-2.5 py-0.5 bg-emerald-50 text-emerald-700 text-[11px] font-bold rounded-md border border-emerald-200 shadow-sm">達標 (-${Math.abs(diff)}s)</div>`;
                        } else {
                            stdBadgeHtml = `<div class="mt-2.5 inline-block px-2.5 py-0.5 bg-rose-50/60 text-rose-500 text-[11px] font-bold rounded-md border border-rose-100 shadow-sm">差 ${diff}s 達標</div>`;
                        }
                    }

                    pbHtml += `<div onclick="openTrendChart('${name}', '${stroke}')" class="bg-white border border-slate-200/80 rounded-2xl p-6 shadow-sm hover:shadow-md hover:border-blue-500 cursor-pointer transition relative flex flex-col justify-between space-y-2">
                        <div>
                            <h3 class="text-sm font-bold text-slate-700 tracking-normal mb-1">${stroke}</h3>
                            ${isJuniorBadge}
                            <div class="text-2xl font-extrabold text-slate-900 tracking-tight tabular-nums mt-1">${indDisplay}${absHtml}</div>
                        </div>
                        <div class="flex flex-col items-start pt-1">
                            ${stdBadgeHtml}
                            <div class="text-xs font-medium text-slate-400 mt-3 truncate w-full tracking-wide">${bottomItem.activity_year || ''} ${bottomItem.activity_short_name || bottomItem.activity_name || ''}</div>
                        </div>
                    </div>`;
                });
                pbHtml += `</div></div>`; container.innerHTML += pbHtml;
            } else { container.innerHTML += `<p class="text-center text-slate-400 text-sm mt-8">無成績數據</p>`; }
        }

        // 🧠 【智慧縮放隱藏版】成績比較表
        function renderMultiCompareTable(athletes, dataMap, checkedEvents, container, include25m) {
            const activeEventsList = getActiveEventsList(include25m);
            const eventsToTrack = checkedEvents.length > 0 ? checkedEvents : activeEventsList;
            const matrix = {}; eventsToTrack.forEach(evt => { matrix[evt] = {}; athletes.forEach(name => { matrix[evt][name] = { secs: Infinity, display: '-', item: null }; }); });
            athletes.forEach(name => { dataMap[name].forEach(item => { const strokeName = item.standardEventName; if (strokeName && matrix[strokeName]) { let secs = timeToSeconds(item.result_text); if (secs < matrix[strokeName][name].secs) { matrix[strokeName][name] = { secs: secs, display: cleanResultText(item.result_text), item: item }; } } }); });
            const activeEvents = eventsToTrack.filter(evt => athletes.some(name => matrix[evt][name].secs !== Infinity));
            
            if (activeEvents.length > 0) {
                let tableHtml = `<div class="mb-12"><h2 class="text-lg font-bold text-slate-900 mb-1 border-b border-slate-200 pb-4">成績比較表</h2><p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-4 mt-2">左右滑動查看所有選手 (將滑鼠移至成績上方可查看賽事來源)</p><div class="overflow-x-auto rounded-2xl border border-slate-200 shadow-sm relative bg-white"><table class="w-full text-left text-sm text-slate-800"><thead class="bg-slate-50 border-b border-slate-200"><tr><th class="px-4 py-4 font-bold text-xs text-slate-500 sticky left-0 z-20 bg-slate-50 border-r border-slate-200 whitespace-nowrap">賽事項目</th>`;
                
                let thMinWidth = 'min-w-[70px] md:min-w-[90px]';
                if (athletes.length <= 2) thMinWidth = 'min-w-[90px] md:min-w-[110px]';
                else if (athletes.length === 3) thMinWidth = 'min-w-[80px] md:min-w-[100px]';

                athletes.forEach(name => { tableHtml += `<th class="px-2 py-3 font-bold text-center border-l border-slate-200 ${thMinWidth} whitespace-nowrap text-slate-800">${name}</th>`; }); tableHtml += `</tr></thead><tbody class="divide-y divide-slate-100">`;
                
                activeEvents.forEach((evt, index) => {
                    let minSecs = Infinity; athletes.forEach(name => { if (matrix[evt][name].secs < minSecs) minSecs = matrix[evt][name].secs; });
                    let shortEvt = evt.replace('公尺', 'm'); 
                    let isJuniorTag = evt.includes('25') ? `<br><span class="inline-block mt-1 bg-purple-50 text-purple-600 text-[9px] font-bold px-1.5 py-0.5 rounded border border-purple-200 uppercase">25m</span>` : '';
                    
                    tableHtml += `<tr class="bg-white hover:bg-slate-50 transition"><td class="px-3 py-4 font-bold text-xs text-slate-700 whitespace-nowrap sticky left-0 z-10 bg-white border-r border-slate-200 align-middle">${shortEvt} ${isJuniorTag}</td>`;
                    
                    athletes.forEach(name => {
                        const data = matrix[evt][name]; 
                        const isWinner = data.secs === minSecs && minSecs !== Infinity; 
                        
                        let dynamicTextSize = 'text-sm md:text-base'; 
                        if (athletes.length >= 4) dynamicTextSize = 'text-xs md:text-sm';

                        const cellStyle = isWinner 
                            ? `bg-indigo-50 text-indigo-600 font-extrabold shadow-[inset_0_0_0_1px_rgba(79,70,229,0.2)] rounded-lg scale-[1.02] transform transition-transform duration-200` 
                            : 'text-slate-600 font-medium';
                            
                        const tooltipText = data.item ? `${data.item.activity_year} ${data.item.activity_short_name || data.item.activity_name || ''}` : '';
                        const cursorStyle = data.item ? 'cursor-help hover:bg-slate-50' : '';
                        
                        tableHtml += `<td class="px-1.5 py-2.5 text-center border-l border-slate-100 align-middle ${isWinner ? 'p-[2px]' : ''}" title="${tooltipText}">
                            <div class="py-2 px-1 rounded-lg ${cellStyle} ${cursorStyle} transition-colors">
                                <div class="${dynamicTextSize} tracking-tight tabular-nums">${data.display}</div>
                            </div>
                        </td>`;
                    }); tableHtml += `</tr>`;
                }); tableHtml += `</tbody></table></div></div>`; container.innerHTML += tableHtml;
            } else { container.innerHTML += `<p class="text-center text-slate-400 bg-gray-800 p-6 rounded-lg mb-8 border border-gray-700">該條件下無法進行成績比較</p>`; }
        }

        // 渲染歷屆參賽紀錄清單
        function renderHistoryList(historyData, container, titleText) {
            if (historyData.length === 0) return;
            let historyHtml = `<div><h2 class="text-lg font-bold text-slate-900 mb-6 border-b border-slate-200 pb-3">${titleText}</h2><div class="space-y-3">`;
            historyData.forEach(item => {
                let badgeClass = 'bg-blue-50 text-blue-600 border-blue-200'; 
                if (item.event_display === '總成績') badgeClass = 'bg-emerald-50 text-emerald-700 border-emerald-200';
                if (item.event_display && item.event_display.includes('棒')) badgeClass = 'bg-amber-50 text-amber-700 border-amber-200';
                
                const displayResult = cleanResultText(item.result_text); const splitText = getSplitText(item.result_text);
                let athleteBadge = selectedAthletes.length > 1 ? `<span class="px-2 py-0.5 text-[9px] font-bold bg-slate-800 text-white rounded shadow-sm">${item.athleteName}</span>` : '';
                
                historyHtml += `<div class="bg-white border border-slate-200 rounded-2xl p-5 flex flex-col md:flex-row md:items-start justify-between shadow-sm hover:shadow-md transition">

                            <span class="text-[10px] font-bold text-slate-500 bg-slate-100 px-2 py-0.5 rounded-full">${item.activity_year || ''}</span>
                            ${athleteBadge}
                        </div>
                        <h3 class="text-sm font-bold text-slate-800 leading-tight">${item.group_display || ''} ${item.event_name || '賽事'}</h3>

                    </div>

                        <div class="text-2xl font-extrabold text-slate-900 tracking-tight tabular-nums">${displayResult}</div>
                        ${splitText ? `<div class="text-xs font-medium text-blue-500 mt-1.5 uppercase font-bold tracking-wide">SPLIT ${splitText}</div>` : ''}
                    </div>
                </div>`;
            }); historyHtml += `</div></div>`; container.innerHTML += historyHtml;
        }

        // Chart.js 智慧圖表核心引擎
        function openTrendChart(athleteName, eventName) {
            const rawData = globalAthleteRawData[athleteName];
            if (!rawData) return;

            let records = rawData.filter(item => item.standardEventName === eventName);
            records = records.map(item => {
                let month = 1;
                if (item.match_dt) { month = parseInt(item.match_dt.split('-')[1], 10); } 
                else if (item.raw_date) { month = parseInt(item.raw_date.split('/')[0], 10); }
                let halfKey = month <= 6 ? 'H1' : 'H2';
                
                return {
                    ...item,
                    seconds: timeToSeconds(item.result_text),
                    displayTime: cleanResultText(item.result_text),
                    split: getSplitText(item.result_text),
                    parsedYear: parseInt(item.activity_year, 10),
                    halfKey: halfKey
                };
            }).filter(item => item.seconds !== Infinity && !isNaN(item.seconds));

            if (records.length === 0) { alert("該項目尚無足夠的歷史成績繪製圖表"); return; }

            records.sort((a, b) => parseInt(a.activity_year, 10) - parseInt(b.activity_year, 10));

            let halvedMap = {};
            records.forEach(r => {
                let groupKey = `${r.parsedYear}-${r.halfKey}`;
                if (!halvedMap[groupKey] || r.seconds < halvedMap[groupKey].seconds) { halvedMap[groupKey] = r; }
            });

            let filteredTrends = Object.values(halvedMap);
            filteredTrends.sort((a, b) => {
                if (a.parsedYear !== b.parsedYear) return a.parsedYear - b.parsedYear;
                return a.halfKey === 'H1' ? -1 : 1;
            });

            const labels = filteredTrends.map(r => `${r.parsedYear} ${r.halfKey === 'H1' ? '上半' : '下半'}`);
            const dataPoints = filteredTrends.map(r => r.seconds);

            const minSec = Math.min(...dataPoints);
            const maxSec = Math.max(...dataPoints);
            const range = maxSec - minSec;
            
            const padding = range > 0 ? range * 0.12 : 0.2;
            const chartMin = Math.max(0, minSec - padding);
            const chartMax = maxSec + padding;

            let calculatedStep = 1.0;
            if (range <= 1.0) { calculatedStep = 0.1; } 
            else if (range <= 3.0) { calculatedStep = 0.2; } 
            else if (range <= 6.0) { calculatedStep = 0.5; }

            document.getElementById('modalTitle').textContent = `${athleteName} - ${eventName}`;
            document.getElementById('modalSubtitle').textContent = `歷年共 ${filteredTrends.length} 個賽期趨勢點 (每半年度精選最佳表現)`;

            const modal = document.getElementById('chartModal');
            modal.classList.remove('hidden');

            const ctx = document.getElementById('growthChart').getContext('2d');
            if (myChartInstance) { myChartInstance.destroy(); } 

            myChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '完賽秒數',
                        data: dataPoints,
                        borderColor: '#4f46e5',     
                        borderWidth: 2.5,
                        backgroundColor: 'rgba(79, 70, 229, 0.04)', 
                        fill: true,
                        tension: 0.2,               
                        pointRadius: 6,             
                        pointHoverRadius: 9,
                        pointBackgroundColor: '#4f46e5',
                        pointBorderColor: '#fff',
                        pointBorderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }, 
                        tooltip: {
                            callbacks: {
                                title: function(context) { return filteredTrends[context[0].dataIndex].activity_name; },
                                label: function(context) {
                                    const item = filteredTrends[context.dataIndex];
                                    let text = `成績: ${item.displayTime}`;
                                    if (item.split) text += ` (${item.split})`;
                                    return text;
                                }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false }, 
                            ticks: { font: { size: 11, weight: 'bold' }, color: '#94a3b8' }
                        },
                        y: {
                            reverse: true,    
                            min: chartMin,    
                            max: chartMax,    
                            grid: { color: '#f1f5f9' },
                            ticks: {
                                stepSize: calculatedStep, 
                                font: { size: 11, family: 'monospace' },
                                color: '#94a3b8',
                                callback: function(value) { return formatSeconds(value); }
                            }
                        }
                    }
                }
            });
        }

        function closeChartModal() {
            document.getElementById('chartModal').classList.add('hidden');
            if (myChartInstance) { myChartInstance.destroy(); myChartInstance = null; }
        }
    </script>
</body>
</html>
