<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秀山泳隊成績查詢平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .toggle-checkbox:checked { right: 0; border-color: #3b82f6; }
        .toggle-checkbox:checked + .toggle-label { background-color: #3b82f6; }
    </style>
</head>
<body class="bg-gray-900 min-h-screen p-4 md:p-8 font-sans text-gray-100">

    <div class="max-w-5xl mx-auto bg-gray-800 rounded-xl shadow-2xl overflow-hidden p-6 border border-gray-700">
        <h1 class="text-3xl font-extrabold text-center text-blue-400 mb-6 tracking-wide">🏊 秀山泳隊成績查詢平台</h1>

        <div class="flex border-b border-gray-700 mb-8">
            <button id="tabBtn-athlete" class="w-1/2 py-3 text-center font-bold text-blue-400 border-b-2 border-blue-500 transition focus:outline-none">
                👤 選手成績查詢
            </button>
            <button id="tabBtn-event" class="w-1/2 py-3 text-center font-bold text-gray-500 border-b-2 border-transparent hover:text-gray-300 transition focus:outline-none">
                🏆 賽事總覽
            </button>
        </div>

        <div id="tab-athlete" class="tab-content active">
            <form id="athleteForm" class="space-y-6 mb-8">
                <div class="relative">
                    <label class="block text-sm font-medium text-gray-300 mb-2">選擇選手 (可多位查詢)</label>
                    <div id="selectedAthletesContainer" class="flex flex-wrap gap-2 mb-2 empty:hidden"></div>
                    <input type="text" id="athleteInput" placeholder="輸入姓名尋找選手..." autocomplete="off"
                           class="w-full rounded-lg border border-gray-600 bg-gray-700 text-white px-4 py-3 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500 transition shadow-inner">
                    <ul id="autocompleteList" class="absolute z-50 w-full bg-gray-700 border border-gray-600 rounded-lg mt-1 max-h-48 overflow-y-auto hidden shadow-xl no-scrollbar"></ul>
                </div>

                <div class="flex items-center justify-between bg-gray-700/50 p-3 rounded-lg border border-gray-600">
                    <div class="flex items-center">
                        <span class="text-xl mr-2">🐣</span>
                        <div>
                            <div class="text-sm font-bold text-gray-200">顯示 25 公尺初階賽事</div>
                            <div class="text-xs text-gray-400">開啟後將列入 25m 自由式、仰式等項目</div>
                        </div>
                    </div>
                    <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" name="toggle25m-athlete" id="toggle25m-athlete" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-gray-500 appearance-none cursor-pointer transition-transform duration-200 ease-in-out"/>
                        <label for="toggle25m-athlete" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-500 cursor-pointer"></label>
                    </div>
                </div>

                <div>
                    <button type="button" id="toggleFiltersBtn" class="text-sm text-blue-400 hover:text-blue-300 flex items-center transition">
                        <span id="filterIcon" class="mr-1">▼</span> 展開篩選條件 (年份、賽事項目)
                    </button>
                </div>

                <div id="advancedFilters" class="bg-gray-900/50 p-4 rounded-lg border border-gray-700 space-y-4 hidden">
                    <div>
                        <label for="year" class="block text-sm font-medium text-gray-400 mb-1">限定賽事年份 <span class="text-blue-400 ml-2">(註：僅過濾歷史記錄，上方PB 顯示生涯最佳)</span></label>
                        <select id="year" class="w-full md:w-1/3 rounded-md border border-gray-600 bg-gray-700 text-white px-3 py-2 focus:outline-none focus:border-blue-500">
                            <option value="">全部年份 (預設)</option>
                            <option value="2026">2026</option>
                            <option value="2025">2025</option>
                            <option value="2024">2024</option>
                            <option value="2023">2023</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">限定賽事項目 (未勾選則分析全部)</label>
                        <div id="eventFiltersContainer" class="grid grid-cols-2 md:grid-cols-4 gap-2"></div>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-blue-700 focus:ring-4 focus:ring-blue-500/50 transition duration-200 shadow-lg text-lg">
                    開始查詢
                </button>
            </form>
        </div>

        <div id="tab-event" class="tab-content">
            <form id="eventForm" class="space-y-6 mb-8">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">選擇賽事</label>
                    <select id="activitySelect" required class="w-full rounded-lg border border-gray-600 bg-gray-700 text-white px-4 py-3 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-500 transition shadow-inner">
                        <option value="" disabled selected>請選擇一場賽事...</option>
                    </select>
                </div>
                
                <div class="flex items-center justify-between bg-gray-700/50 p-3 rounded-lg border border-gray-600">
                    <div class="flex items-center">
                        <span class="text-xl mr-2">🐣</span>
                        <div>
                            <div class="text-sm font-bold text-gray-200">計算 25 公尺 PB 比較</div>
                            <div class="text-xs text-gray-400">開啟後將比對初階 25m 項目的生涯紀錄</div>
                        </div>
                    </div>
                    <div class="relative inline-block w-12 mr-2 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" name="toggle25m-event" id="toggle25m-event" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 border-gray-500 appearance-none cursor-pointer transition-transform duration-200 ease-in-out"/>
                        <label for="toggle25m-event" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-500 cursor-pointer"></label>
                    </div>
                </div>

                <button type="submit" class="w-full bg-purple-600 text-white font-bold py-3 px-4 rounded-lg hover:bg-purple-700 focus:ring-4 focus:ring-purple-500/50 transition duration-200 shadow-lg text-lg">
                    查詢賽事成績
                </button>
            </form>
        </div>

        <div id="resultsContainer" class="space-y-8">
            <p class="text-center text-gray-500 text-sm" id="initialMessage">請搜尋選手或選擇賽事以進行分析</p>
        </div>
    </div>

    <script>
        const baseStandardEvents = [
            '50公尺自由式', '100公尺自由式', '200公尺自由式', '400公尺自由式',
            '50公尺仰式', '100公尺仰式', '200公尺仰式',
            '50公尺蛙式', '100公尺蛙式', '200公尺蛙式',
            '50公尺蝶式', '100公尺蝶式', '200公尺蝶式',
            '100公尺混合式', '200公尺混合式', '400公尺混合式'
        ];
        const juniorEvents = ['25公尺自由式', '25公尺仰式', '25公尺蛙式', '25公尺蝶式'];

        let allAthletesDB = []; 
        let selectedAthletes = []; 

        function cleanResultText(text) {
            if (!text) return 'N/A';
            return String(text).trim().split(' ')[0]; 
        }

        function timeToSeconds(timeStr) {
            let cleanStr = cleanResultText(timeStr);
            if (cleanStr === 'N/A' || cleanStr.includes('DQ')) return Infinity;
            let parts = cleanStr.split(':');
            if (parts.length === 2) return parseInt(parts[0], 10) * 60 + parseFloat(parts[1]);
            let val = parseFloat(cleanStr);
            return isNaN(val) ? Infinity : val;
        }

        function formatSeconds(secs) {
            if (secs === Infinity) return 'N/A';
            let m = Math.floor(secs / 60);
            let s = (secs % 60).toFixed(2);
            if (s.length < 5) s = s.padStart(5, '0'); 
            return m > 0 ? `${m.toString().padStart(2, '0')}:${s}` : s;
        }

        function getActiveEventsList(include25m) {
            return include25m ? juniorEvents.concat(baseStandardEvents) : baseStandardEvents;
        }

        function getStandardEventName(item, include25m) {
            const fullText = (item.group_display || "") + " " + (item.event_name || "");
            if (item.event_display === '總成績') return null;
            let isSplit = item.event_display && item.event_display.includes('棒');
            let isInd = !fullText.includes('接力') && !isSplit;
            const activeEvents = getActiveEventsList(include25m);

            if (isInd) {
                return activeEvents.find(evt => fullText.includes(evt)) || null;
            } else if (isSplit) {
                let dist = fullText.match(/4\s*[xX×*]\s*(25|50|100|200)/) ? fullText.match(/4\s*[xX×*]\s*(25|50|100|200)/)[1] + "公尺" : 
                          (fullText.includes('25公尺') ? "25公尺" : (fullText.includes('50公尺') ? "50公尺" : (fullText.includes('100公尺') ? "100公尺" : null)));
                let strokeMatch = fullText.match(/\((仰式|蛙式|蝶式|自由式)\)/);
                let stroke = strokeMatch ? strokeMatch[1] : null;
                if (!stroke && fullText.includes('混合式接力')) {
                    if (item.event_display.includes('1棒')) stroke = "仰式";
                    if (item.event_display.includes('2棒')) stroke = "蛙式";
                    if (item.event_display.includes('3棒')) stroke = "蝶式";
                    if (item.event_display.includes('4棒')) stroke = "自由式";
                } else if (!stroke && fullText.includes('自由式接力')) stroke = "自由式";
                let result = dist && stroke ? dist + stroke : null;
                return activeEvents.includes(result) ? result : null;
            }
            return null;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/api/athletes');
                if (res.ok) {
                    const rawAthletes = await res.json();
                    allAthletesDB = [...new Set(rawAthletes.map(name => name.trim()))];
                }
            } catch (err) { console.error("無法取得選手名單", err); }

            try {
                const res = await fetch('/api/activities');
                if (res.ok) {
                    const activities = await res.json();
                    const activitySelect = document.getElementById('activitySelect');
                    activities.forEach(act => {
                        const opt = document.createElement('option');
                        opt.value = act.activity_name; 
                        opt.textContent = `${act.activity_year} ${act.activity_short_name || act.activity_name}`;
                        activitySelect.appendChild(opt);
                    });
                }
            } catch (err) { console.error("無法取得賽事名單", err); }

            const filterContainer = document.getElementById('eventFiltersContainer');
            baseStandardEvents.forEach(evt => {
                const label = document.createElement('label');
                label.className = "cursor-pointer";
                label.innerHTML = `<input type="checkbox" value="${evt}" class="event-checkbox peer sr-only"><div class="text-center px-2 py-2 text-xs font-medium rounded-md border border-gray-600 text-gray-400 peer-checked:bg-blue-600 peer-checked:text-white peer-checked:border-blue-500 hover:bg-gray-700 transition">${evt}</div>`;
                filterContainer.appendChild(label);
            });
        });

        const tabBtnAthlete = document.getElementById('tabBtn-athlete');
        const tabBtnEvent = document.getElementById('tabBtn-event');
        const tabAthlete = document.getElementById('tab-athlete');
        const tabEvent = document.getElementById('tab-event');
        const container = document.getElementById('resultsContainer');

        function switchTab(mode) {
            container.innerHTML = '<p class="text-center text-gray-500 text-sm">請搜尋選手或選擇賽事以進行分析</p>'; 
            if (mode === 'athlete') {
                tabBtnAthlete.classList.add('text-blue-400', 'border-blue-500'); tabBtnAthlete.classList.remove('text-gray-500', 'border-transparent');
                tabBtnEvent.classList.remove('text-blue-400', 'border-blue-500'); tabBtnEvent.classList.add('text-gray-500', 'border-transparent');
                tabAthlete.classList.add('active'); tabEvent.classList.remove('active');
            } else {
                tabBtnEvent.classList.add('text-blue-400', 'border-blue-500'); tabBtnEvent.classList.remove('text-gray-500', 'border-transparent');
                tabBtnAthlete.classList.remove('text-blue-400', 'border-blue-500'); tabBtnAthlete.classList.add('text-gray-500', 'border-transparent');
                tabEvent.classList.add('active'); tabAthlete.classList.remove('active');
            }
        }
        tabBtnAthlete.addEventListener('click', () => switchTab('athlete'));
        tabBtnEvent.addEventListener('click', () => switchTab('event'));

        document.getElementById('toggleFiltersBtn').addEventListener('click', function() {
            const panel = document.getElementById('advancedFilters');
            const icon = document.getElementById('filterIcon');
            panel.classList.toggle('hidden');
            icon.textContent = panel.classList.contains('hidden') ? '▶' : '▼';
        });

        const athleteInput = document.getElementById('athleteInput');
        const autocompleteList = document.getElementById('autocompleteList');
        const selectedContainer = document.getElementById('selectedAthletesContainer');

        athleteInput.addEventListener('input', function() {
            const val = this.value.trim();
            autocompleteList.innerHTML = '';
            if (!val) { autocompleteList.classList.add('hidden'); return; }
            const matches = allAthletesDB.filter(name => name.includes(val) && !selectedAthletes.includes(name));
            if (matches.length > 0) {
                autocompleteList.classList.remove('hidden');
                matches.forEach(name => {
                    const li = document.createElement('li'); li.textContent = name; li.className = "px-4 py-2 hover:bg-blue-600 cursor-pointer transition";
                    li.addEventListener('click', () => { addAthlete(name); athleteInput.value = ''; autocompleteList.classList.add('hidden'); athleteInput.focus(); });
                    autocompleteList.appendChild(li);
                });
            } else { autocompleteList.classList.add('hidden'); }
        });
        document.addEventListener('click', (e) => { if (e.target !== athleteInput) autocompleteList.classList.add('hidden'); });

        function addAthlete(name) { if (selectedAthletes.includes(name)) return; selectedAthletes.push(name); renderSelectedAthletes(); }
        function removeAthlete(name) { selectedAthletes = selectedAthletes.filter(n => n !== name); renderSelectedAthletes(); }
        function renderSelectedAthletes() {
            selectedContainer.innerHTML = '';
            selectedAthletes.forEach(name => {
                const chip = document.createElement('div');
                chip.className = "flex items-center bg-blue-900 text-blue-100 px-3 py-1 rounded-full text-sm font-bold border border-blue-700 shadow-sm";
                chip.innerHTML = `${name} <button type="button" class="ml-2 text-blue-300 hover:text-white focus:outline-none" onclick="removeAthlete('${name}')">✕</button>`;
                selectedContainer.appendChild(chip);
            });
        }

        document.getElementById('athleteForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            if (selectedAthletes.length === 0) { alert("請至少選擇一位選手！"); return; }
            const yearInput = document.getElementById('year').value;
            const checkedEvents = Array.from(document.querySelectorAll('.event-checkbox:checked')).map(cb => cb.value);
            const include25m = document.getElementById('toggle25m-athlete').checked;

            container.innerHTML = '<p class="text-center text-blue-400 font-semibold animate-pulse text-lg">資料篩選與戰力解析中...</p>';

            try {
                const fetchPromises = selectedAthletes.map(name => fetch(`/api/results?name=${encodeURIComponent(name.trim())}`).then(res => res.json()));
                const resultsArray = await Promise.all(fetchPromises);

                const athletesPbData = {}; let combinedHistory = []; 

                selectedAthletes.forEach((name, index) => {
                    let rawData = resultsArray[index];
                    rawData.forEach(item => { item.standardEventName = getStandardEventName(item, include25m); });
                    let pbData = rawData;
                    if (checkedEvents.length > 0) pbData = pbData.filter(item => item.standardEventName && checkedEvents.includes(item.standardEventName));
                    athletesPbData[name] = pbData;

                    let histData = pbData; 
                    if (yearInput) histData = histData.filter(item => String(item.activity_year) === yearInput);
                    histData.forEach(item => combinedHistory.push({ ...item, athleteName: name }));
                });

                combinedHistory.sort((a, b) => (b.activity_year || 0) - (a.activity_year || 0));
                container.innerHTML = '';
                
                if (selectedAthletes.length === 1) renderSinglePbBoard(selectedAthletes[0], athletesPbData[selectedAthletes[0]], container, include25m);
                else renderMultiCompareTable(selectedAthletes, athletesPbData, checkedEvents, container, include25m);
                renderHistoryList(combinedHistory, container, "詳細歷史紀錄");

            } catch (error) {
                container.innerHTML = `<p class="text-center text-red-500 bg-red-900/20 p-4 rounded-lg">錯誤：${error.message}</p>`;
            }
        });

        document.getElementById('eventForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const activityName = document.getElementById('activitySelect').value;
            if (!activityName) return;
            const include25m = document.getElementById('toggle25m-event').checked;

            container.innerHTML = '<p class="text-center text-purple-400 font-semibold animate-pulse text-lg">大數據解析中：下載賽事名單並與生涯 PB 進行交叉比對...</p>';

            try {
                const res = await fetch(`/api/results?activity=${encodeURIComponent(activityName)}`);
                const eventData = await res.json();
                if (eventData.length === 0) { container.innerHTML = `<p class="text-center text-gray-400 bg-gray-800 p-6 rounded-lg">找不到 ${activityName} 的賽事資料</p>`; return; }

                const uniqueAthletes = [...new Set(eventData.filter(item => item.event_display !== '總成績').map(item => item.student_name.trim()))].filter(Boolean);
                const lifetimePromises = uniqueAthletes.map(name => fetch(`/api/results?name=${encodeURIComponent(name)}`).then(r => r.json()));
                const lifetimeResults = await Promise.all(lifetimePromises);

                const lifetimeMap = {};
                uniqueAthletes.forEach((name, idx) => {
                    const data = lifetimeResults[idx];
                    data.forEach(d => { d.standardEventName = getStandardEventName(d, include25m); });
                    lifetimeMap[name] = data;
                });

                const groupedEvents = {};
                eventData.forEach(item => {
                    item.standardEventName = getStandardEventName(item, include25m);
                    const key = (item.group_display || "未分組") + " - " + (item.event_name || "未知項目");
                    if (!groupedEvents[key]) groupedEvents[key] = [];
                    groupedEvents[key].push(item);
                });

                container.innerHTML = `<h2 class="text-2xl font-black text-purple-400 mb-6 text-center border-b border-purple-800 pb-4">${activityName}</h2>`;

                for (const [groupName, items] of Object.entries(groupedEvents)) {
                    items.sort((a, b) => timeToSeconds(a.result_text) - timeToSeconds(b.result_text));
                    let groupHtml = `<div class="bg-gray-800 border border-gray-700 rounded-xl shadow-lg mb-6 overflow-hidden"><div class="bg-gray-900/80 px-4 py-3 border-b border-gray-700"><h3 class="text-base font-bold text-gray-200">${groupName}</h3></div><ul class="divide-y divide-gray-700/50">`;

                    items.forEach((item, index) => {
                        const evtSecs = timeToSeconds(item.result_text);
                        const stdName = item.standardEventName;
                        let pbBadge = '';
                        const cleanStudentName = item.student_name.trim();

                        if (stdName && item.event_display !== '總成績' && lifetimeMap[cleanStudentName]) {
                            let lifetimePbSecs = Infinity;
                            lifetimeMap[cleanStudentName].forEach(lItem => {
                                if (lItem.standardEventName === stdName) {
                                    const lSecs = timeToSeconds(lItem.result_text);
                                    if (lSecs < lifetimePbSecs) lifetimePbSecs = lSecs;
                                }
                            });
                            if (lifetimePbSecs !== Infinity) {
                                if (evtSecs <= lifetimePbSecs) { pbBadge = `<span class="px-2 py-0.5 ml-3 text-[10px] font-black bg-yellow-900/50 text-yellow-400 rounded-full border border-yellow-700 shadow-[0_0_8px_rgba(250,204,21,0.4)] whitespace-nowrap">🌟 New PB!</span>`; } 
                                else { const diff = (evtSecs - lifetimePbSecs).toFixed(2); pbBadge = `<span class="ml-3 text-[11px] text-gray-500 whitespace-nowrap">PB: ${formatSeconds(lifetimePbSecs)} <span class="text-red-400/80">(+${diff}s)</span></span>`; }
                            }
                        }

                        let rankIcon = ''; if (index === 0) rankIcon = '🥇'; else if (index === 1) rankIcon = '🥈'; else if (index === 2) rankIcon = '🥉';
                        let displayType = item.event_display === '總成績' ? `<span class="px-1.5 py-0.5 text-[9px] bg-green-900 text-green-300 rounded mr-2">總成績</span>` : '';
                        if (item.event_display && item.event_display.includes('棒')) displayType = `<span class="px-1.5 py-0.5 text-[9px] bg-yellow-900 text-yellow-300 rounded mr-2">${item.event_display}</span>`;

                        groupHtml += `<li class="px-4 py-3 flex items-center justify-between hover:bg-gray-700/30 transition"><div class="flex items-center text-sm font-bold text-gray-300 w-[45%] truncate"><span class="w-6 text-center mr-1">${rankIcon}</span> ${displayType}<span class="truncate">${cleanStudentName}</span></div><div class="flex items-center justify-end w-[55%] overflow-hidden"><span class="text-lg font-black text-white tracking-wide flex-shrink-0">${cleanResultText(item.result_text)}</span>${pbBadge}</div></li>`;
                    });
                    groupHtml += `</ul></div>`; container.innerHTML += groupHtml;
                }
            } catch (error) { container.innerHTML = `<p class="text-center text-red-500 bg-red-900/20 p-4 rounded-lg">系統發生錯誤：${error.message}</p>`; }
        });

        function renderSinglePbBoard(name, data, container, include25m) {
            const activeEvents = getActiveEventsList(include25m);
            const pbs = {}; activeEvents.forEach(evt => pbs[evt] = { indTime: Infinity, indItem: null, absTime: Infinity, absItem: null });
            data.forEach(item => {
                const strokeName = item.standardEventName; if (!strokeName) return;
                let isInd = !(item.event_display && item.event_display.includes('棒'));
                if (pbs[strokeName]) {
                    let secs = timeToSeconds(item.result_text);
                    if (secs !== Infinity) {
                        if (isInd && secs < pbs[strokeName].indTime) { pbs[strokeName].indTime = secs; pbs[strokeName].indItem = item; }
                        if (secs < pbs[strokeName].absTime) { pbs[strokeName].absTime = secs; pbs[strokeName].absItem = item; }
                    }
                }
            });
            const validPbKeys = Object.keys(pbs).filter(k => pbs[k].absTime !== Infinity);
            if (validPbKeys.length > 0) {
                let pbHtml = `<div class="mb-8 border-b border-gray-700 pb-8"><h2 class="text-xl font-bold text-yellow-500 mb-4 flex items-center">🏆 ${name} 生涯最佳表現 (PB)</h2><div class="grid grid-cols-2 md:grid-cols-3 gap-4">`;
                validPbKeys.forEach(stroke => {
                    const record = pbs[stroke];
                    let indDisplay = record.indItem ? cleanResultText(record.indItem.result_text) : '無個人賽';
                    let absHtml = record.absTime < record.indTime ? `<span class="text-sm font-bold text-green-400 ml-1">(${cleanResultText(record.absItem.result_text)})</span>` : '';
                    const bottomItem = record.indItem || record.absItem;
                    let isJuniorBadge = stroke.includes('25公尺') ? `<span class="absolute top-3 right-3 w-2.5 h-2.5 bg-blue-500 rounded-full border-2 border-gray-800" title="25m 初階項目"></span>` : '';
                    pbHtml += `<div class="bg-gray-800 border border-gray-700 rounded-xl p-4 shadow-lg hover:border-blue-500 transition relative"><h3 class="text-sm font-bold text-gray-300 pr-8">${stroke}</h3>${isJuniorBadge}<div class="text-2xl font-black text-blue-300 tracking-tight mt-1">${indDisplay} ${absHtml}</div><div class="text-[10px] text-gray-500 mt-2 leading-tight">${bottomItem.activity_year || '?'} ${bottomItem.activity_short_name || bottomItem.activity_name || ''}</div></div>`;
                });
                pbHtml += `</div></div>`; container.innerHTML += pbHtml;
            } else { container.innerHTML += `<p class="text-center text-gray-400 bg-gray-800 p-6 rounded-lg mb-8 border border-gray-700">該條件下無 PB 紀錄</p>`; }
        }

        // ==========================================
        // 【關鍵修正】多人對戰表：加入首欄固定與橫向捲動
        // ==========================================
        function renderMultiCompareTable(athletes, dataMap, checkedEvents, container, include25m) {
            const activeEventsList = getActiveEventsList(include25m);
            const eventsToTrack = checkedEvents.length > 0 ? checkedEvents : activeEventsList;
            const matrix = {};
            eventsToTrack.forEach(evt => { matrix[evt] = {}; athletes.forEach(name => { matrix[evt][name] = { secs: Infinity, display: '-', item: null }; }); });
            athletes.forEach(name => {
                dataMap[name].forEach(item => {
                    const strokeName = item.standardEventName;
                    if (strokeName && matrix[strokeName]) {
                        let secs = timeToSeconds(item.result_text);
                        if (secs < matrix[strokeName][name].secs) { matrix[strokeName][name] = { secs: secs, display: cleanResultText(item.result_text), item: item }; }
                    }
                });
            });
            const activeEvents = eventsToTrack.filter(evt => athletes.some(name => matrix[evt][name].secs !== Infinity));
            if (activeEvents.length > 0) {
                let tableHtml = `<div class="mb-8 border-b border-gray-700 pb-8">
                    <h2 class="text-xl font-bold text-red-400 mb-1">⚔️ 選手成績比較表</h2>
                    <p class="text-[11px] text-blue-300 mb-3 animate-pulse">👉 表格可向左右滑動查看所有選手</p>
                    <div class="overflow-x-auto rounded-lg border border-gray-700 shadow-xl relative">
                        <table class="w-full text-left text-sm text-gray-300">
                            <thead class="bg-gray-800 text-gray-200 border-b border-gray-600">
                                <tr>
                                    <th class="px-3 py-3 font-bold sticky left-0 z-20 bg-gray-800 border-r border-gray-600 whitespace-nowrap">項目</th>`;
                athletes.forEach(name => { 
                    // 設定每位選手欄位的最小寬度，防止手機版擠壓
                    tableHtml += `<th class="px-3 py-3 font-bold text-center border-l border-gray-700 min-w-[110px] whitespace-nowrap">${name}</th>`; 
                });
                tableHtml += `</tr></thead><tbody>`;
                
                activeEvents.forEach((evt, index) => {
                    let minSecs = Infinity; athletes.forEach(name => { if (matrix[evt][name].secs < minSecs) minSecs = matrix[evt][name].secs; });
                    // 使用實體背景色，避免 sticky 捲動時透明度重疊
                    const bgClass = index % 2 === 0 ? 'bg-gray-900' : 'bg-gray-800';
                    
                    // 將 "公尺" 縮寫為 "m" 以節省橫向空間
                    let shortEvt = evt.replace('公尺', 'm');
                    let isJuniorTag = evt.includes('25') ? `<span class="ml-1 text-blue-400 font-bold text-lg leading-none">•</span>` : '';
                    
                    tableHtml += `<tr class="${bgClass} border-b border-gray-700 hover:bg-gray-700 transition">`;
                    // 首行固定 (sticky left-0)
                    tableHtml += `<td class="px-3 py-3 font-medium text-gray-200 whitespace-nowrap sticky left-0 z-10 ${bgClass} border-r border-gray-600 shadow-[2px_0_4px_rgba(0,0,0,0.2)]">${shortEvt} ${isJuniorTag}</td>`;
                    
                    athletes.forEach(name => {
                        const data = matrix[evt][name];
                        const isWinner = data.secs === minSecs && minSecs !== Infinity;
                        const cellClass = isWinner ? 'bg-yellow-900/20 text-yellow-400 font-black' : 'text-gray-400 font-medium';
                        // 使用 line-clamp-2 限制賽事名稱最多兩行，保持高度整齊
                        const sourceText = data.item ? `<div class="text-[10px] text-gray-500 mt-1 font-normal leading-tight line-clamp-2" title="${data.item.activity_short_name || data.item.activity_name}">${data.item.activity_year} ${data.item.activity_short_name || data.item.activity_name || ''}</div>` : '';
                        tableHtml += `<td class="px-3 py-3 text-center border-l border-gray-700 ${cellClass}"><div class="text-lg tracking-wide">${data.display}</div>${sourceText}</td>`;
                    });
                    tableHtml += `</tr>`;
                });
                tableHtml += `</tbody></table></div></div>`; container.innerHTML += tableHtml;
            } else { container.innerHTML += `<p class="text-center text-gray-400 bg-gray-800 p-6 rounded-lg mb-8 border border-gray-700">該條件下無法進行對戰比較</p>`; }
        }

        function renderHistoryList(historyData, container, titleText) {
            if (historyData.length === 0) { container.innerHTML += `<p class="text-center text-gray-500 mt-8">此年份與項目無歷史參賽紀錄</p>`; return; }
            let historyHtml = `<div><h2 class="text-xl font-bold text-blue-400 mb-4">📅 ${titleText}</h2><div class="space-y-3">`;
            historyData.forEach(item => {
                let badgeClass = 'bg-blue-900 text-blue-300 border border-blue-700'; 
                if (item.event_display === '總成績') badgeClass = 'bg-green-900 text-green-300 border border-green-700';
                if (item.event_display && item.event_display.includes('棒')) badgeClass = 'bg-yellow-900 text-yellow-300 border border-yellow-700';
                const displayResult = cleanResultText(item.result_text);
                let athleteBadge = selectedAthletes.length > 1 ? `<span class="px-2 py-0.5 text-[10px] font-bold bg-purple-900 text-purple-200 rounded border border-purple-700">${item.athleteName}</span>` : '';
                historyHtml += `<div class="bg-gray-800 border border-gray-700 rounded-lg p-4 flex flex-col md:flex-row md:items-center justify-between shadow-sm hover:border-gray-500 transition"><div class="mb-2 md:mb-0"><div class="flex items-center flex-wrap gap-2 mb-1"><span class="px-2 py-0.5 text-[10px] font-bold rounded ${badgeClass}">${item.event_display || '成績'}</span><span class="text-[10px] text-gray-400 bg-gray-700 px-2 py-0.5 rounded-full">${item.activity_year || '?'}</span>${athleteBadge}</div><h3 class="text-sm font-bold text-gray-200 leading-tight mt-2">${item.group_display || item.event_name || '未命名賽事'}</h3><p class="text-xs text-gray-500 mt-1">${item.activity_short_name || item.activity_name || ''}</p></div><div class="text-2xl font-black text-white tracking-tight text-right">${displayResult}</div></div>`;
            });
            historyHtml += `</div></div>`; container.innerHTML += historyHtml;
        }
    </script>
</body>
</html>
