<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游泳比賽成績查詢系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen p-4 md:p-8 font-sans text-gray-100">

    <div class="max-w-md mx-auto bg-gray-800 rounded-xl shadow-lg overflow-hidden p-6 md:max-w-2xl border border-gray-700">
        <h1 class="text-2xl font-extrabold text-center text-blue-400 mb-6">🏊 游泳成績查詢</h1>

        <form id="searchForm" class="space-y-4 mb-8">
            <div>
                <label for="name" class="block text-sm font-medium text-gray-300 mb-1">選手姓名</label>
                <input type="text" id="name" required placeholder="例如：張懿婷" 
                       class="w-full rounded-md border border-gray-600 bg-gray-700 text-white px-3 py-2 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
            </div>
            <div>
                <label for="year" class="block text-sm font-medium text-gray-300 mb-1">賽事年份 (選填：僅過濾歷次紀錄，PB 不受限)</label>
                <input type="number" id="year" placeholder="例如：2026" 
                       class="w-full rounded-md border border-gray-600 bg-gray-700 text-white px-3 py-2 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500">
            </div>
            <button type="submit" 
                    class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-700 transition duration-200">
                開始查詢
            </button>
        </form>

        <div id="resultsContainer" class="space-y-6">
            <p class="text-center text-gray-500 text-sm">請輸入姓名以查詢成績</p>
        </div>
    </div>

    <script>
        // 定義標準的個人賽事清單
        const standardEvents = [
            '50公尺自由式', '100公尺自由式', '200公尺自由式', '400公尺自由式',
            '50公尺仰式', '100公尺仰式', '200公尺仰式',
            '50公尺蛙式', '100公尺蛙式', '200公尺蛙式',
            '50公尺蝶式', '100公尺蝶式', '200公尺蝶式',
            '100公尺混合式', '200公尺混合式', '400公尺混合式'
        ];

        function cleanResultText(text) {
            if (text === null || text === undefined || text === '') return 'N/A';
            return String(text).trim().split(' ')[0]; 
        }

        function timeToSeconds(timeStr) {
            let cleanStr = cleanResultText(timeStr);
            if (cleanStr === 'N/A' || cleanStr.includes('DQ')) return Infinity;
            
            let parts = cleanStr.split(':');
            if (parts.length === 2) {
                return parseInt(parts[0], 10) * 60 + parseFloat(parts[1]);
            }
            let val = parseFloat(cleanStr);
            return isNaN(val) ? Infinity : val;
        }

        document.getElementById('searchForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const yearInput = document.getElementById('year').value;
            const container = document.getElementById('resultsContainer');

            container.innerHTML = '<p class="text-center text-blue-400 font-semibold animate-pulse">資料解析與分段萃取中...</p>';

            try {
                const apiUrl = `/api/results?name=${encodeURIComponent(name)}`;
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const allData = await response.json();

                container.innerHTML = '';

                if (allData.length === 0) {
                    container.innerHTML = '<p class="text-center text-gray-400">找不到符合的成績資料 😢</p>';
                    return;
                }

                // --- 1. 計算 PB (包含個人最佳與極限分段) ---
                const pbs = {};
                standardEvents.forEach(evt => {
                    pbs[evt] = { indTime: Infinity, indItem: null, absTime: Infinity, absItem: null };
                });

                allData.forEach(item => {
                    const fullText = (item.group_display || "") + " " + (item.event_name || "");
                    if (item.event_display === '總成績') return; 

                    let strokeName = null;
                    let isSplit = item.event_display && item.event_display.includes('棒');
                    let isInd = !fullText.includes('接力') && !isSplit;

                    if (isInd) {
                        for (let evt of standardEvents) {
                            if (fullText.includes(evt)) {
                                strokeName = evt;
                                break;
                            }
                        }
                    } else if (isSplit) {
                        let dist = null;
                        let stroke = null;
                        
                        let distMatch = fullText.match(/4\s*[xX×*]\s*(50|100|200)/);
                        if (distMatch) dist = distMatch[1] + "公尺";
                        else if (fullText.includes('50公尺')) dist = "50公尺";
                        else if (fullText.includes('100公尺')) dist = "100公尺";

                        let strokeMatch = fullText.match(/\((仰式|蛙式|蝶式|自由式)\)/);
                        if (strokeMatch) {
                            stroke = strokeMatch[1];
                        } else if (fullText.includes('混合式接力')) {
                            if (item.event_display.includes('1棒')) stroke = "仰式";
                            if (item.event_display.includes('2棒')) stroke = "蛙式";
                            if (item.event_display.includes('3棒')) stroke = "蝶式";
                            if (item.event_display.includes('4棒')) stroke = "自由式";
                        } else if (fullText.includes('自由式接力')) {
                            stroke = "自由式";
                        }

                        if (dist && stroke) strokeName = dist + stroke;
                    }

                    if (strokeName && pbs[strokeName]) {
                        let secs = timeToSeconds(item.result_text);
                        if (secs !== Infinity) {
                            if (isInd && secs < pbs[strokeName].indTime) {
                                pbs[strokeName].indTime = secs;
                                pbs[strokeName].indItem = item;
                            }
                            if (secs < pbs[strokeName].absTime) {
                                pbs[strokeName].absTime = secs;
                                pbs[strokeName].absItem = item;
                            }
                        }
                    }
                });

                const validPbKeys = Object.keys(pbs).filter(k => pbs[k].absTime !== Infinity);

                if (validPbKeys.length > 0) {
                    let pbHtml = `
                        <div class="mb-8">
                            <h2 class="text-lg font-bold text-yellow-500 border-b-2 border-yellow-600 pb-1 mb-4 flex items-center">
                                🏆 全時期個人最佳成績 (PB)
                            </h2>
                            <div class="grid grid-cols-2 gap-3">
                    `;
                    
                    validPbKeys.forEach(stroke => {
                        const record = pbs[stroke];
                        
                        let indDisplay = record.indItem ? cleanResultText(record.indItem.result_text) : '無個人賽';
                        let absHtml = '';
                        if (record.absTime < record.indTime) {
                            const fastSplit = cleanResultText(record.absItem.result_text);
                            absHtml = `<span class="text-sm font-bold text-green-400 ml-1" title="接力分段最快紀錄">(${fastSplit})</span>`;
                        }

                        const bottomItem = record.indItem || record.absItem;

                        pbHtml += `
                            <div class="bg-gray-800 border border-gray-700 rounded-lg p-3 shadow-md">
                                <h3 class="text-sm font-bold text-gray-200">${stroke}</h3>
                                <div class="text-xl font-black text-blue-300 tracking-tight mt-1">
                                    ${indDisplay} ${absHtml}
                                </div>
                                <div class="text-[10px] text-gray-400 mt-2 truncate" title="${bottomItem.activity_short_name || bottomItem.activity_name}">
                                    ${bottomItem.activity_year || '?'} ${bottomItem.activity_short_name || bottomItem.activity_name || ''}
                                </div>
                            </div>
                        `;
                    });
                    pbHtml += `</div></div>`;
                    container.innerHTML += pbHtml;
                }

                // --- 2. 歷次賽事紀錄 ---
                const historyData = yearInput 
                    ? allData.filter(item => item.activity_year && String(item.activity_year) === yearInput) 
                    : allData;

                if (historyData.length > 0) {
                    let historyHtml = `
                        <div>
                            <h2 class="text-lg font-bold text-blue-400 border-b-2 border-blue-600 pb-1 mb-4 flex items-center">
                                📅 賽事紀錄 ${yearInput ? `(${yearInput}年)` : '(全部年份)'}
                            </h2>
                            <div class="space-y-3">
                    `;

                    historyData.forEach(item => {
                        let badgeClass = 'bg-blue-900 text-blue-300 border border-blue-700'; 
                        if (item.event_display === '總成績') badgeClass = 'bg-green-900 text-green-300 border border-green-700';
                        if (item.event_display && item.event_display.includes('棒')) badgeClass = 'bg-yellow-900 text-yellow-300 border border-yellow-700';

                        const displayResult = cleanResultText(item.result_text);

                        historyHtml += `
                            <div class="bg-gray-800 border border-gray-700 rounded-lg p-4 shadow-sm">
                                <div class="flex justify-between items-start mb-1">
                                    <span class="px-2 py-1 text-[10px] font-bold rounded ${badgeClass}">
                                        ${item.event_display || '成績'}
                                    </span>
                                    <span class="text-[10px] text-gray-400 bg-gray-700 px-2 py-1 rounded-full">${item.activity_year || '?'}</span>
                                </div>
                                <h3 class="text-sm font-bold text-gray-200 mt-2 leading-tight">${item.group_display || item.event_name || '未命名賽事'}</h3>
                                <p class="text-xs text-gray-400 mt-1">${item.activity_short_name || item.activity_name || ''}</p>
                                <div class="mt-2 flex justify-end items-baseline">
                                    <span class="text-xl font-black text-gray-100 tracking-tight">${displayResult}</span>
                                </div>
                            </div>
                        `;
                    });

                    historyHtml += `</div></div>`;
                    container.innerHTML += historyHtml;
                } else {
                    container.innerHTML += `<p class="text-center text-gray-500 mt-8">此年份無參賽紀錄</p>`;
                }

            } catch (error) {
                console.error('查詢失敗:', error);
                container.innerHTML = `<p class="text-center text-red-500">系統發生錯誤：${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
